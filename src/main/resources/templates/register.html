<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
	    <title>SmartSpend - Register</title>
	    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
	    <link rel="stylesheet" th:href="@{/css/style.css}"/>
	</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow">
                <h3 class="text-center mb-4">Create Account</h3>

                <form th:action="@{/register}" th:object="${user}" method="post">

                    <div class="mb-3">
                        <label>Name</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Enter your name"/>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" th:field="*{email}" class="form-control" placeholder="Enter your email"/>
                    </div>

                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" th:field="*{password}" class="form-control" placeholder="Enter password"/>
                    </div>

                    <div class="mb-3">
                        <label>Confirm Password</label>
                        <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm password"/>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Register</button>

                    <p class="text-center mt-3">Already have an account? 
                        <a th:href="@{/login}">Login</a>
                    </p>

                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
