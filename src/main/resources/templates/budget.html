<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>SmartSpend - budget</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
	<link rel="stylesheet" th:href="@{/css/style.css}" />
</head>

<body class="bg-light">
	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card p-4 shadow">
					<h3 class="text-center mb-4">Add Budget</h3>


					<form th:action="@{/saveBudget}" th:object="${budget}" method="post">

						<div class="mb-3">
							<label>Monthly Budget</label>
							<input type="number" class="form-control" th:field="*{monthlyBudget}"
								placeholder="Enter Amount" />
						</div>

						<div class="mb-3">
							<label>Category</label>
							<select class="form-select" th:field="*{category}">
								<option value="">Select Category</option>
								<option th:each="cat : ${categories}" th:value="${cat.catId}" th:text="${cat.name}">
								</option>
							</select>
						</div>
						<div class="mb-3">
							<label>Month</label>
							<input type="number" class="form-control" th:field="*{month}"
								placeholder="Enter number of Month" />
						</div>

						<div class="mb-3">
							<label>Year</label>
							<input type="number" class="form-control" th:field="*{year}"
								placeholder="Enter number of Year" />
						</div>


						<button type="submit" class="btn btn-primary w-100">Save</button>

					</form>

					<h5 class="mt-4">Your existing budgets</h5>
					<table class="table table-bordered">
						<thead>
							<tr>
								<th>Category</th>
								<th>Budget Amount</th>
								<th>Month</th>
								<th>Year</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="b : ${existingbudgets}">
								<td th:text="${b.category.name}"></td>
								<td th:text="${b.monthlyBudget}"></td>
								<td th:text="${b.month}"></td>
								<td th:text="${b.year}"></td>
							</tr>
						</tbody>
					</table>

				</div>
			</div>
		</div>
	</div>
</body>

</html>
