<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
	    <title>SmartSpend - Register</title>
	    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
	    <link rel="stylesheet" th:href="@{/css/style.css}"/>
	</head>

<body class="bg-light">
	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card p-4 shadow">
					<h3 class="text-center mb-4">Add Transaction</h3>

					<form th:action="@{/savetransaction}" th:object="${transaction}" method="post">

						<div class="mb-3">
							<label>Amount</label>
							<input type="number" class="form-control" th:field="*{amount}" placeholder="Enter Amount" />
						</div>

						<div class="mb-3">
							<label>Category</label>
							<select class="form-select" th:field="*{category}">
								<option value="">Select Category</option>
								<option th:each="cat : ${categories}" th:value="${cat.catId}" th:text="${cat.name}">
								</option>
							</select>
						</div>
						<div class="mb-3">
							<label>Date</label>
							<input type="date" class="form-control" th:field="*{date}" />
						</div>

						<div class="mb-3">
							<label>Note</label>
							<input type="text" class="form-control" th:field="*{note}" placeholder="Write note" />
						</div>


						<button type="submit" class="btn btn-primary w-100">Save</button>

					</form>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
